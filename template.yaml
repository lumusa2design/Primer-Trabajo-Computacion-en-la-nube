AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: CRUD API desacoplada para Computacion en la Nube

Resources:

  ItemsSamTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ItemsSam
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  CreateItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: create_item/
      Handler: app.lambda_handler
      Runtime: python3.13
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: ItemsSam
      Role: arn:aws:iam::223977122891:role/LabRole
      Events:
        CreateItem:
          Type: Api
          Properties:
            Path: /items
            Method: post

  ReadItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: read_item/
      Handler: app.lambda_handler
      Runtime: python3.13
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: ItemsSam
      Role: arn:aws:iam::223977122891:role/LabRole
      Events:
        GetItems:
          Type: Api
          Properties:
            Path: /items
            Method: get

        GetItem:
          Type: Api
          Properties:
            Path: /items/{id}
            Method: get

  UpdateItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: update_item/
      Handler: app.lambda_handler
      Runtime: python3.13
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: ItemsSam
      Role: arn:aws:iam::223977122891:role/LabRole
      Events:
        UpdateItem:
          Type: Api
          Properties:
            Path: /items/{id}
            Method: put

  DeleteItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: delete_item/
      Handler: app.lambda_handler
      Runtime: python3.13
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: ItemsSam
      Role: arn:aws:iam::223977122891:role/LabRole
      Events:
        DeleteItem:
          Type: Api
          Properties:
            Path: /items/{id}
            Method: delete

Outputs:

  ApiUrl:
    Description: URL API Gateway
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"